<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eldritch Rift II — Model (no deps)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #030208;
            color: #6a7a72;
        }

        canvas {
            filter: contrast(1.08) saturate(1.15);
            z-index: 1 !important;
            position: relative !important;
        }

        #status {
            display: block !important;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            font-family: monospace;
            font-size: 12px;
            color: #5ec89a;
            background: rgba(8, 10, 14, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #1e2a24;
        }

        #status.error {
            color: #e88;
        }

        #toggleControls {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            z-index: 99999 !important;
            background: rgba(45, 80, 60, 0.92) !important;
            color: #c8e8d8 !important;
            border: 1px solid #2a4a3a !important;
            border-radius: 50% !important;
            width: 56px !important;
            height: 56px !important;
            font-size: 24px !important;
            cursor: pointer !important;
        }

        .controls-panel.hidden {
            transform: translateX(100%) !important;
        }

        .controls-panel {
            transition: transform 0.3s ease !important;
            background: rgba(8, 10, 14, 0.92);
            border: 1px solid #1e2a24;
            color: #9ab0a5;
            max-height: 90vh;
            overflow-y: auto;
        }

        h3 {
            color: #7dd4a8;
            border-bottom: 1px solid #1a3028;
        }

        .value-display {
            color: #5ec89a;
            font-family: monospace;
        }

        .reset-btn {
            background: #1a3028;
            color: #8ecfb0;
            border: 1px solid #2a4a3c;
        }
    </style>
</head>

<body>
    <p>Eldritch Rift II — embedded GLB over the void</p>
    <div id="status">Unpacking embedded model…</div>
    <canvas>WebGL required</canvas>

    <div id="controls" class="controls-panel">
        <h3>Scene</h3>
        <div class="control-group">
            <label for="modelScale">Model scale:</label>
            <input type="range" id="modelScale" min="0.3" max="2.5" step="0.01" value="1.0">
            <span class="value-display" id="modelScaleValue">1.00</span>
        </div>
        <div class="control-group">
            <label for="modelYaw">Model yaw:</label>
            <input type="range" id="modelYaw" min="-3.14" max="3.14" step="0.02" value="0.0">
            <span class="value-display" id="modelYawValue">0.00</span>
        </div>
        <div class="control-group">
            <label for="camDist">Camera distance:</label>
            <input type="range" id="camDist" min="0.6" max="3.5" step="0.02" value="1.0">
            <span class="value-display" id="camDistValue">1.00</span>
        </div>

        <h3>Void (same as Lovecraft)</h3>
        <div class="control-group">
            <label for="tentacleTwist">Tentacle twist:</label>
            <input type="range" id="tentacleTwist" min="0.1" max="1.2" step="0.01" value="0.45">
            <span class="value-display" id="tentacleTwistValue">0.45</span>
        </div>
        <div class="control-group">
            <label for="riftSize">Central rift:</label>
            <input type="range" id="riftSize" min="0.2" max="1.2" step="0.01" value="0.55">
            <span class="value-display" id="riftSizeValue">0.55</span>
        </div>
        <div class="control-group">
            <label for="tentacleCount">Tentacle columns:</label>
            <input type="range" id="tentacleCount" min="4" max="12" step="1" value="8">
            <span class="value-display" id="tentacleCountValue">8</span>
        </div>
        <div class="control-group">
            <label for="merge">Organic merge:</label>
            <input type="range" id="merge" min="0.05" max="0.6" step="0.01" value="0.28">
            <span class="value-display" id="mergeValue">0.28</span>
        </div>
        <div class="control-group">
            <label for="fogDensity">Fog density:</label>
            <input type="range" id="fogDensity" min="0.05" max="0.9" step="0.01" value="0.42">
            <span class="value-display" id="fogDensityValue">0.42</span>
        </div>
        <div class="control-group">
            <label for="glowIntensity">Biolume glow:</label>
            <input type="range" id="glowIntensity" min="0.2" max="2.5" step="0.01" value="1.15">
            <span class="value-display" id="glowIntensityValue">1.15</span>
        </div>
        <div class="control-group">
            <label for="pulseSpeed">Pulse speed:</label>
            <input type="range" id="pulseSpeed" min="0.0" max="2.0" step="0.05" value="0.65">
            <span class="value-display" id="pulseSpeedValue">0.65</span>
        </div>
        <div class="control-group">
            <label for="colorShift">Hue shift:</label>
            <input type="range" id="colorShift" min="0.0" max="6.28" step="0.05" value="0.0">
            <span class="value-display" id="colorShiftValue">0.00</span>
        </div>
        <div class="control-group">
            <label for="orbitSpeed">Background orbit:</label>
            <input type="range" id="orbitSpeed" min="0.0" max="0.8" step="0.01" value="0.12">
            <span class="value-display" id="orbitSpeedValue">0.12</span>
        </div>
        <div class="control-group">
            <label for="driftSpeed">Void drift:</label>
            <input type="range" id="driftSpeed" min="0.0" max="1.0" step="0.01" value="0.18">
            <span class="value-display" id="driftSpeedValue">0.18</span>
        </div>
        <div class="control-group">
            <label for="quality">Quality (resolution):</label>
            <input type="range" id="quality" min="0.15" max="1.0" step="0.05" value="0.45">
            <span class="value-display" id="qualityValue">0.45</span>
        </div>
        <button id="resetBtn" class="reset-btn">Reset to default</button>
    </div>
    <button id="toggleControls" title="Toggle controls">⚙️</button>

    <script type="x-shader/x-vertex" id="bg-vs">
attribute vec2 a_position;
varying vec2 v_uv;
void main() {
  v_uv = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}
</script>

    <script type="x-shader/x-fragment" id="bg-fs">
precision mediump float;
uniform vec2 u_resolution;
uniform float u_time;
uniform float u_tentacleTwist;
uniform float u_riftSize;
uniform int u_tentacleCount;
uniform float u_merge;
uniform float u_fogDensity;
uniform float u_glowIntensity;
uniform float u_pulseSpeed;
uniform float u_colorShift;
uniform float u_orbitSpeed;
uniform float u_driftSpeed;
varying vec2 v_uv;
#define MAX_STEPS 72
#define MAX_DIST 28.0
#define SURF_DIST 0.004
#define PI 3.14159265
mat2 rot2(float a) {
  float s = sin(a); float c = cos(a);
  return mat2(c, -s, s, c);
}
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}
float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
    mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
}
float fbm(vec2 p) {
  float v = 0.0; float a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise(p); p *= 2.1; a *= 0.5;
  }
  return v;
}
float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}
float sdSphere(vec3 p, float r) { return length(p) - r; }
vec3 domainWarp(vec3 p, float t) {
  vec3 q = p; float w = u_driftSpeed;
  q.x += 0.35 * sin(q.y * 1.7 + q.z * 0.8 + t * w);
  q.y += 0.25 * sin(q.z * 1.5 + q.x * 0.9 + t * w * 1.3);
  q.z += 0.3 * sin(q.x * 1.2 + q.y * 1.1 + t * w * 0.9);
  return q;
}
float sceneSDF(vec3 p0) {
  vec3 p = domainWarp(p0, u_time);
  float m = u_merge;
  float tw = u_tentacleTwist;
  float t = u_time * u_pulseSpeed;
  float ang = atan(p.y, p.x);
  float rPulse = u_riftSize * (1.0 + 0.12 * sin(ang * 6.0 + t * 2.0));
  float eye = sdSphere(p, rPulse);
  vec3 pt = p;
  float helix = tw * pt.y * 2.5;
  pt.xz *= rot2(helix + t * 0.15);
  float d = eye;
  int count = u_tentacleCount;
  for (int i = 0; i < 12; i++) {
    if (i >= count) break;
    float fi = float(i);
    float a = (2.0 * PI * fi) / float(count);
    vec3 q = pt;
    q.xz *= rot2(a + t * 0.08);
    q.x -= 1.65 + 0.08 * sin(t + fi);
    float wave = 0.22 * sin(q.y * 3.2 + fi * 1.7 + t * 1.5);
    q.z += wave;
    q.x += 0.06 * sin(q.y * 5.0 + t);
    float rad = 0.11 + 0.035 * sin(q.y * 7.0 + t * 2.5 + fi);
    float cyl = length(q.xz) - rad;
    float cap = max(cyl, abs(q.y) - 3.8 - 0.15 * sin(q.x * 4.0 + t));
    d = smin(d, cap, m);
  }
  vec3 ps = p * vec3(1.1, 1.4, 1.1);
  ps.xz *= rot2(t * 0.2);
  float tend = length(vec2(length(ps.xz) - 0.35, ps.y * 0.9)) - 0.04;
  tend = max(tend - 0.02 * sin(ps.y * 12.0 + t * 3.0), abs(ps.y) - 2.2);
  d = smin(d, tend, m * 0.6);
  return d;
}
vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.0015, 0.0);
  float d = sceneSDF(p);
  return normalize(vec3(
    sceneSDF(p + e.xyy) - d,
    sceneSDF(p + e.yxy) - d,
    sceneSDF(p + e.yyx) - d
  ));
}
vec3 eldritchColor(vec3 p, vec3 n, float glowAmt, float marchT) {
  float t = u_time * u_pulseSpeed + u_colorShift;
  float pulse = 0.5 + 0.5 * sin(length(p) * 4.0 + t * 2.0);
  vec3 deep = vec3(0.02, 0.03, 0.06);
  vec3 sick = vec3(0.12, 0.42, 0.28);
  vec3 violet = vec3(0.35, 0.1, 0.45);
  vec3 bile = vec3(0.25, 0.55, 0.35);
  float nDot = 0.5 + 0.5 * dot(n, normalize(vec3(0.2, 0.85, 0.35)));
  float cavity = 0.35 + 0.65 * fbm(p.xz * 2.5 + p.y);
  vec3 base = mix(deep, mix(sick, violet, pulse * nDot), cavity);
  base = mix(base, bile, glowAmt * 0.85);
  float rim = pow(1.0 - max(dot(n, vec3(0.0, 0.0, 1.0)), 0.0), 3.0);
  base += vec3(0.15, 0.45, 0.35) * rim * 0.4;
  float fogMix = 1.0 - exp(-marchT * 0.045);
  base = mix(base, deep * 1.2, fogMix * 0.5);
  return base;
}
vec4 raymarch(vec3 ro, vec3 rd) {
  float t = 0.0;
  float glow = 0.0;
  for (int i = 0; i < MAX_STEPS; i++) {
    vec3 p = ro + rd * t;
    float d = sceneSDF(p);
    glow += u_fogDensity * 0.018 / (0.025 + d * d * 18.0);
    t += d;
    if (t > MAX_DIST) break;
    if (d < SURF_DIST) {
      vec3 n = calcNormal(p);
      return vec4(eldritchColor(p, n, glow, t), t);
    }
  }
  vec2 sn = rd.xy * 40.0 + u_time * 0.02;
  float stars = pow(noise(sn), 12.0) * 0.85;
  float neb = fbm(rd.xz * 3.0 + u_time * u_driftSpeed * 0.1);
  vec3 sky = vec3(0.01, 0.015, 0.04);
  sky += vec3(0.08, 0.03, 0.12) * neb * 0.35;
  sky += vec3(0.35, 0.5, 0.4) * stars;
  vec3 col = sky + vec3(0.15, 0.55, 0.35) * glow * u_glowIntensity * 0.12;
  return vec4(col, MAX_DIST);
}
void main() {
  vec2 uv = (v_uv - 0.5) * 2.0;
  uv.x *= u_resolution.x / u_resolution.y;
  float orbit = u_time * u_orbitSpeed;
  float camR = 4.1;
  vec3 ro = vec3(camR * cos(orbit), 0.35 + 0.25 * sin(u_time * 0.2), camR * sin(orbit));
  vec3 target = vec3(0.0, 0.1, 0.0);
  vec3 f = normalize(target - ro);
  vec3 r = normalize(cross(vec3(0.0, 1.0, 0.0), f));
  vec3 u = cross(f, r);
  vec3 rd = normalize(f + uv.x * r + uv.y * u);
  vec4 hit = raymarch(ro, rd);
  vec3 col = hit.rgb;
  float vig = 1.0 - length(v_uv - 0.5) * 1.15;
  col *= vig;
  float ca = length(v_uv - 0.5);
  col.rb += vec2(0.02, 0.015) * ca;
  col = col / (col + vec3(0.85));
  col = pow(col, vec3(0.95));
  gl_FragColor = vec4(col, 1.0);
}
</script>

    <script type="x-shader/x-vertex" id="model-vs">
precision mediump float;
attribute vec3 a_position;
attribute vec3 a_normal;
attribute vec2 a_uv;
uniform mat4 u_mvp;
uniform mat4 u_modelView;
uniform mat3 u_normalMatrix;
varying vec3 v_normal;
varying vec3 v_view;
varying vec2 v_uv;
void main() {
  vec4 mvPos = u_modelView * vec4(a_position, 1.0);
  v_view = -mvPos.xyz;
  v_normal = u_normalMatrix * a_normal;
  v_uv = a_uv;
  gl_Position = u_mvp * vec4(a_position, 1.0);
}
</script>

    <script type="x-shader/x-fragment" id="model-fs">
precision mediump float;
varying vec3 v_normal;
varying vec3 v_view;
varying vec2 v_uv;
uniform float u_time;
void main() {
  vec3 N = normalize(v_normal);
  vec3 V = normalize(v_view);
  vec3 L = normalize(vec3(0.35, 0.85, 0.4));
  float ndl = max(dot(N, L), 0.0);
  float wrap = ndl * 0.65 + 0.35;
  vec3 base = vec3(0.42, 0.48, 0.44);
  vec3 shadow = vec3(0.12, 0.22, 0.18);
  vec3 col = mix(shadow, base, wrap);
  float rim = pow(1.0 - max(dot(N, V), 0.0), 2.2);
  col += vec3(0.25, 0.55, 0.38) * rim * 0.45;
  col += vec3(0.15, 0.08, 0.22) * (1.0 - wrap) * 0.35;
  float pulse = 0.5 + 0.5 * sin(u_time * 1.3 + v_uv.y * 6.28);
  col += vec3(0.08, 0.2, 0.12) * pulse * 0.08;
  gl_FragColor = vec4(col, 1.0);
}
</script>

    <script>
(function () {
    const statusEl = document.getElementById("status");

    function multiplyMat4(a, b) {
        const o = new Float32Array(16);
        for (let c = 0; c < 4; c++) {
            for (let r = 0; r < 4; r++) {
                o[c * 4 + r] =
                    a[0 * 4 + r] * b[c * 4 + 0] +
                    a[1 * 4 + r] * b[c * 4 + 1] +
                    a[2 * 4 + r] * b[c * 4 + 2] +
                    a[3 * 4 + r] * b[c * 4 + 3];
            }
        }
        return o;
    }

    function translationMat4(tx, ty, tz) {
        const m = new Float32Array(16);
        m[0] = m[5] = m[10] = m[15] = 1;
        m[12] = tx; m[13] = ty; m[14] = tz;
        return m;
    }

    function scaleMat4(sx, sy, sz) {
        const m = new Float32Array(16);
        m[0] = sx; m[5] = sy; m[10] = sz; m[15] = 1;
        return m;
    }

    function rotationYMat4(angle) {
        const c = Math.cos(angle), s = Math.sin(angle);
        const m = new Float32Array(16);
        m[0] = c; m[2] = s; m[5] = 1;
        m[8] = -s; m[10] = c; m[15] = 1;
        return m;
    }

    function quatToMat4(q) {
        const x = q[0], y = q[1], z = q[2], w = q[3];
        const x2 = x + x, y2 = y + y, z2 = z + z;
        const xx = x * x2, xy = x * y2, xz = x * z2;
        const yy = y * y2, yz = y * z2, zz = z * z2;
        const wx = w * x2, wy = w * y2, wz = w * z2;
        const m = new Float32Array(16);
        m[0] = 1 - (yy + zz); m[1] = xy + wz; m[2] = xz - wy; m[3] = 0;
        m[4] = xy - wz; m[5] = 1 - (xx + zz); m[6] = yz + wx; m[7] = 0;
        m[8] = xz + wy; m[9] = yz - wx; m[10] = 1 - (xx + yy); m[11] = 0;
        m[12] = m[13] = m[14] = 0; m[15] = 1;
        return m;
    }

    function composeTRS(t, q, s) {
        const T = translationMat4(t[0], t[1], t[2]);
        const R = quatToMat4(q);
        const S = scaleMat4(s[0], s[1], s[2]);
        return multiplyMat4(T, multiplyMat4(R, S));
    }

    function perspective(fovyRad, aspect, near, far) {
        const f = 1 / Math.tan(fovyRad / 2);
        const m = new Float32Array(16);
        m[0] = f / aspect;
        m[5] = f;
        m[10] = (far + near) / (near - far);
        m[11] = -1;
        m[14] = (2 * far * near) / (near - far);
        m[15] = 0;
        return m;
    }

    function subtract(a, b) {
        return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
    }

    function dot3(a, b) {
        return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
    }

    function normalize3(v) {
        const l = Math.hypot(v[0], v[1], v[2]) || 1;
        return [v[0] / l, v[1] / l, v[2] / l];
    }

    function cross(a, b) {
        return [
            a[1] * b[2] - a[2] * b[1],
            a[2] * b[0] - a[0] * b[2],
            a[0] * b[1] - a[1] * b[0]
        ];
    }

    /** World-to-camera view matrix (column-major, right-handed, -Z forward). */
    function lookAtView(eye, target, up) {
        const f = normalize3(subtract(target, eye));
        const s = normalize3(cross(up, f));
        const u = cross(f, s);
        const m = new Float32Array(16);
        m[0] = s[0]; m[4] = s[1]; m[8] = s[2];
        m[1] = u[0]; m[5] = u[1]; m[9] = u[2];
        m[2] = -f[0]; m[6] = -f[1]; m[10] = -f[2];
        m[3] = m[7] = m[11] = 0;
        m[12] = -dot3(s, eye);
        m[13] = -dot3(u, eye);
        m[14] = dot3(f, eye);
        m[15] = 1;
        return m;
    }

    function mat3FromMat4(m) {
        return new Float32Array([
            m[0], m[1], m[2],
            m[4], m[5], m[6],
            m[8], m[9], m[10]
        ]);
    }

    function transposeMat3(a) {
        return new Float32Array([
            a[0], a[3], a[6],
            a[1], a[4], a[7],
            a[2], a[5], a[8]
        ]);
    }

    function invertMat3(m) {
        const a = m[0], b = m[1], c = m[2];
        const d = m[3], e = m[4], f = m[5];
        const g = m[6], h = m[7], i = m[8];
        const A = e * i - f * h;
        const B = f * g - d * i;
        const C = d * h - e * g;
        const det = a * A + b * B + c * C;
        if (Math.abs(det) < 1e-12) return new Float32Array([1, 0, 0, 0, 1, 0, 0, 0, 1]);
        const id = 1 / det;
        return new Float32Array([
            A * id, (c * h - b * i) * id, (b * f - c * e) * id,
            B * id, (a * i - c * g) * id, (c * d - a * f) * id,
            C * id, (b * g - a * h) * id, (a * e - b * d) * id
        ]);
    }

    function normalMatrixFromMV(mv) {
        const m3 = mat3FromMat4(mv);
        return transposeMat3(invertMat3(m3));
    }

    function transformPoint(m, p) {
        const x = p[0], y = p[1], z = p[2];
        return [
            m[0] * x + m[4] * y + m[8] * z + m[12],
            m[1] * x + m[5] * y + m[9] * z + m[13],
            m[2] * x + m[6] * y + m[10] * z + m[14]
        ];
    }

    function parseGLB(arrayBuffer) {
        const view = new DataView(arrayBuffer);
        if (view.getUint32(0, true) !== 0x46546C67) throw new Error("Not a glTF binary");
        const length = view.getUint32(8, true);
        let offset = 12;
        let jsonText = null;
        let binChunk = null;
        while (offset < length) {
            const chunkLength = view.getUint32(offset, true);
            const chunkType = view.getUint32(offset + 4, true);
            const data = new Uint8Array(arrayBuffer, offset + 8, chunkLength);
            if (chunkType === 0x4E4F534A) jsonText = new TextDecoder().decode(data);
            else if (chunkType === 0x004E4942) binChunk = data;
            offset += 8 + chunkLength;
        }
        if (!jsonText || !binChunk) throw new Error("Missing JSON or BIN chunk");
        return { gltf: JSON.parse(jsonText), bin: binChunk };
    }

    function accessorSlice(gltf, accessorIndex, bin) {
        const acc = gltf.accessors[accessorIndex];
        const bv = gltf.bufferViews[acc.bufferView];
        const base = (bv.byteOffset || 0) + (acc.byteOffset || 0);
        return bin.subarray(base, base + componentBytes(acc));
    }

    function componentBytes(acc) {
        const comps = { SCALAR: 1, VEC2: 2, VEC3: 3, VEC4: 4 };
        const sizes = { 5120: 1, 5121: 1, 5122: 2, 5123: 2, 5125: 4, 5126: 4 };
        return acc.count * comps[acc.type] * sizes[acc.componentType];
    }

    function loadPrimitive(gltf, prim, bin) {
        const posAcc = gltf.accessors[prim.attributes.POSITION];
        const posBuf = accessorSlice(gltf, prim.attributes.POSITION, bin);
        const positions = new Float32Array(posBuf.buffer, posBuf.byteOffset, posAcc.count * 3);

        let normals = null;
        if (prim.attributes.NORMAL !== undefined) {
            const nAcc = gltf.accessors[prim.attributes.NORMAL];
            const nBuf = accessorSlice(gltf, prim.attributes.NORMAL, bin);
            normals = new Float32Array(nBuf.buffer, nBuf.byteOffset, nAcc.count * 3);
        }

        let uvs = null;
        if (prim.attributes.TEXCOORD_0 !== undefined) {
            const uAcc = gltf.accessors[prim.attributes.TEXCOORD_0];
            const uBuf = accessorSlice(gltf, prim.attributes.TEXCOORD_0, bin);
            uvs = new Float32Array(uBuf.buffer, uBuf.byteOffset, uAcc.count * 2);
        }

        const iAcc = gltf.accessors[prim.indices];
        const iBuf = accessorSlice(gltf, prim.indices, bin);
        let indices;
        if (iAcc.componentType === 5123) {
            indices = new Uint16Array(iBuf.buffer, iBuf.byteOffset, iAcc.count);
        } else if (iAcc.componentType === 5125) {
            indices = new Uint32Array(iBuf.buffer, iBuf.byteOffset, iAcc.count);
        } else {
            throw new Error("Unsupported index type");
        }

        return {
            positions,
            normals,
            uvs,
            indices,
            indexType: iAcc.componentType,
            min: posAcc.min,
            max: posAcc.max
        };
    }

    function getSceneDrawables(gltf) {
        const scene = gltf.scenes[gltf.scene !== undefined ? gltf.scene : 0];
        const out = [];
        const visit = (nodeIndex, parentMat) => {
            const node = gltf.nodes[nodeIndex];
            const t = node.translation || [0, 0, 0];
            const r = node.rotation || [0, 0, 0, 1];
            const s = node.scale || [1, 1, 1];
            const local = composeTRS(t, r, s);
            const world = parentMat ? multiplyMat4(parentMat, local) : local;
            if (node.mesh !== undefined) {
                const mesh = gltf.meshes[node.mesh];
                for (let p = 0; p < mesh.primitives.length; p++) {
                    out.push({ primitive: mesh.primitives[p], matrix: world });
                }
            }
            if (node.children) {
                for (let i = 0; i < node.children.length; i++) {
                    visit(node.children[i], world);
                }
            }
        };
        for (let i = 0; i < scene.nodes.length; i++) {
            visit(scene.nodes[i], null);
        }
        return out;
    }

    function createShader(gl, type, src) {
        const sh = gl.createShader(type);
        gl.shaderSource(sh, src);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
            console.error(gl.getShaderInfoLog(sh));
            gl.deleteShader(sh);
            return null;
        }
        return sh;
    }

    function cornersFromMinMax(min, max) {
        const c = [];
        for (let i = 0; i < 8; i++) {
            c.push([
                i & 1 ? max[0] : min[0],
                i & 2 ? max[1] : min[1],
                i & 4 ? max[2] : min[2]
            ]);
        }
        return c;
    }

    function base64ToArrayBuffer(b64) {
        const bin = atob(b64);
        const len = bin.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
        return bytes.buffer;
    }

    Promise.resolve(base64ToArrayBuffer(EMBEDDED_GLB_BASE64))
        .then((buf) => {
            const { gltf, bin } = parseGLB(buf);
            const drawables = getSceneDrawables(gltf);
            if (!drawables.length) throw new Error("No mesh in scene");

            const merged = [];
            for (let d = 0; d < drawables.length; d++) {
                const prim = loadPrimitive(gltf, drawables[d].primitive, bin);
                merged.push({ ...prim, nodeMatrix: drawables[d].matrix });
            }

            const geo = merged[0];
            const nodeMat = geo.nodeMatrix;
            const min = geo.min, max = geo.max;
            const localCenter = [
                (min[0] + max[0]) * 0.5,
                (min[1] + max[1]) * 0.5,
                (min[2] + max[2]) * 0.5
            ];
            const extent = Math.max(max[0] - min[0], max[1] - min[1], max[2] - min[2]);
            const fit = 2.0 / extent;

            const centerNeg = translationMat4(-localCenter[0], -localCenter[1], -localCenter[2]);
            const fitS = scaleMat4(fit, fit, fit);
            const fitMat = multiplyMat4(fitS, centerNeg);
            const modelBase = multiplyMat4(nodeMat, fitMat);

            const corners = cornersFromMinMax(min, max);
            let wmin = [Infinity, Infinity, Infinity];
            let wmax = [-Infinity, -Infinity, -Infinity];
            for (let i = 0; i < corners.length; i++) {
                const wp = transformPoint(multiplyMat4(nodeMat, fitMat), corners[i]);
                for (let j = 0; j < 3; j++) {
                    wmin[j] = Math.min(wmin[j], wp[j]);
                    wmax[j] = Math.max(wmax[j], wp[j]);
                }
            }
            worldCenter = [
                (wmin[0] + wmax[0]) * 0.5,
                (wmin[1] + wmax[1]) * 0.5,
                (wmin[2] + wmax[2]) * 0.5
            ];
            const diag = Math.hypot(wmax[0] - wmin[0], wmax[1] - wmin[1], wmax[2] - wmin[2]);
            baseRadius = diag * 0.5;
            camDistMul = 1.6;

            const posBuf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
            gl.bufferData(gl.ARRAY_BUFFER, geo.positions, gl.STATIC_DRAW);

            let nbuf = null;
            if (geo.normals) {
                nbuf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, nbuf);
                gl.bufferData(gl.ARRAY_BUFFER, geo.normals, gl.STATIC_DRAW);
            }

            let uvbuf = null;
            if (geo.uvs) {
                uvbuf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, uvbuf);
                gl.bufferData(gl.ARRAY_BUFFER, geo.uvs, gl.STATIC_DRAW);
            }

            const ibuf = gl.createBuffer();
            gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibuf);
            gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, geo.indices, gl.STATIC_DRAW);

            indexCount = geo.indices.length;
            indexType = geo.indexType === 5125 ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
            if (indexType === gl.UNSIGNED_INT) {
                const ext = gl.getExtension("OES_element_index_uint");
                if (!ext) throw new Error("UINT32 indices need OES_element_index_uint");
            }

            mesh = {
                posBuf,
                nbuf,
                uvbuf,
                ibuf,
                modelBase,
                hasNormals: !!geo.normals,
                hasUv: !!geo.uvs
            };

            statusEl.textContent = "Embedded GLB — " + indexCount / 3 + " tris";
        })
        .catch((e) => {
            console.error(e);
            statusEl.textContent = "Failed: " + e.message;
            statusEl.classList.add("error");
        });

    let startTime = Date.now();

    function drawBackground(w, h, time) {
        gl.useProgram(bgProg);
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
        gl.enableVertexAttribArray(bgPosLoc);
        gl.vertexAttribPointer(bgPosLoc, 2, gl.FLOAT, false, 0, 0);
        gl.uniform2f(uBgRes, w, h);
        gl.uniform1f(uBgTime, time);
        gl.uniform1f(uBgTwist, params.tentacleTwist);
        gl.uniform1f(uBgRift, params.riftSize);
        gl.uniform1i(uBgCount, params.tentacleCount);
        gl.uniform1f(uBgMerge, params.merge);
        gl.uniform1f(uBgFog, params.fogDensity);
        gl.uniform1f(uBgGlow, params.glowIntensity);
        gl.uniform1f(uBgPulse, params.pulseSpeed);
        gl.uniform1f(uBgHue, params.colorShift);
        gl.uniform1f(uBgOrbit, params.orbitSpeed);
        gl.uniform1f(uBgDrift, params.driftSpeed);
        gl.drawArrays(gl.TRIANGLES, 0, 6);
    }

    function drawModel(w, h, time) {
        if (!mesh) return;

        const aspect = w / h;
        const proj = perspective(Math.PI / 4, aspect, 0.05, 80);

        const yaw = rotationYMat4(params.modelYaw);
        const userScale = scaleMat4(params.modelScale, params.modelScale, params.modelScale);
        const model = multiplyMat4(multiplyMat4(mesh.modelBase, yaw), userScale);

        const dist = baseRadius * camDistMul * params.camDist;
        const orbitT = time * 0.35;
        const eye = [
            worldCenter[0] + Math.cos(orbitT) * dist * 0.85,
            worldCenter[1] + 0.25 * dist,
            worldCenter[2] + Math.sin(orbitT) * dist * 0.85
        ];
        const view = lookAtView(eye, worldCenter, [0, 1, 0]);

        const modelView = multiplyMat4(view, model);
        const mvp = multiplyMat4(proj, modelView);
        const normMat = normalMatrixFromMV(modelView);

        gl.useProgram(modelProg);
        gl.bindBuffer(gl.ARRAY_BUFFER, mesh.posBuf);
        gl.enableVertexAttribArray(mPos);
        gl.vertexAttribPointer(mPos, 3, gl.FLOAT, false, 0, 0);

        if (mesh.hasNormals && mesh.nbuf) {
            gl.bindBuffer(gl.ARRAY_BUFFER, mesh.nbuf);
            gl.enableVertexAttribArray(mNor);
            gl.vertexAttribPointer(mNor, 3, gl.FLOAT, false, 0, 0);
        } else {
            gl.disableVertexAttribArray(mNor);
            gl.vertexAttrib3f(mNor, 0, 1, 0);
        }

        if (mesh.hasUv && mesh.uvbuf) {
            gl.bindBuffer(gl.ARRAY_BUFFER, mesh.uvbuf);
            gl.enableVertexAttribArray(mUv);
            gl.vertexAttribPointer(mUv, 2, gl.FLOAT, false, 0, 0);
        } else {
            gl.disableVertexAttribArray(mUv);
            gl.vertexAttrib2f(mUv, 0, 0);
        }

        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, mesh.ibuf);
        gl.uniformMatrix4fv(uMvp, false, mvp);
        gl.uniformMatrix4fv(uMv, false, modelView);
        gl.uniformMatrix3fv(uNorm, false, normMat);
        gl.uniform1f(uModelTime, time);
        gl.drawElements(gl.TRIANGLES, indexCount, indexType, 0);
    }

    function render() {
        const displayWidth = canvas.clientWidth;
        const displayHeight = canvas.clientHeight;
        const targetWidth = Math.floor(displayWidth * params.quality);
        const targetHeight = Math.floor(displayHeight * params.quality);

        if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
            canvas.width = targetWidth;
            canvas.height = targetHeight;
        }
        gl.viewport(0, 0, targetWidth, targetHeight);

        const time = (Date.now() - startTime) * 0.001;

        gl.clearColor(0, 0, 0, 1);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        gl.disable(gl.DEPTH_TEST);
        gl.depthMask(false);
        drawBackground(targetWidth, targetHeight, time);

        gl.depthMask(true);
        gl.enable(gl.DEPTH_TEST);
        gl.depthFunc(gl.LEQUAL);
        gl.enable(gl.CULL_FACE);
        gl.cullFace(gl.BACK);
        drawModel(targetWidth, targetHeight, time);

        requestAnimationFrame(render);
    }
    render();
})();
    </script>
